<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DormLift Pro | Technical Project</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --primary: #3498db; --success: #27ae60; --danger: #e74c3c; --dark: #2c3e50; --gray: #95a5a6; --bg: #f5f7f9; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); }
        .page { display: none !important; }
        .page.active { display: block !important; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* 导航栏 */
        nav { background: var(--dark); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; color: white; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .logo { font-size: 22px; font-weight: 800; cursor: pointer; color: white; }
        .nav-links a { color: #bdc3c7; margin-left: 20px; text-decoration: none; cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: white; }

        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
        .card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 25px; border: 1px solid #eee; }

        /* 👤 复刻截图：网格化资料卡 */
        .profile-header { display: flex; gap: 30px; align-items: center; margin-bottom: 25px; }
        .avatar { width: 100px; height: 100px; background: var(--primary); border-radius: 25px; display: flex; align-items: center; justify-content: center; color: white; font-size: 40px; font-weight: bold; }
        .info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .info-item { background: #fafafa; padding: 15px; border-radius: 12px; border: 1px solid #eee; }
        .info-item label { display: block; font-size: 10px; color: var(--gray); font-weight: 800; text-transform: uppercase; margin-bottom: 5px; }
        .info-item div { font-weight: 700; font-size: 15px; color: #2c3e50; }

        /* 📋 任务管理行 */
        .task-list-item { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px 20px; border-radius: 15px; margin-bottom: 12px; border: 1px solid #eee; }
        .btn-cancel { background: var(--danger); color: white; padding: 8px 15px; border-radius: 8px; border: none; font-size: 12px; cursor: pointer; }

        /* 发布表单 */
        #map { height: 350px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #eee; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 12px; box-sizing: border-box; }
        .btn { background: var(--primary); color: white; padding: 14px 25px; border: none; border-radius: 10px; cursor: pointer; font-weight: 700; transition: 0.3s; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: white; width: 500px; padding: 30px; border-radius: 25px; }
    </style>
</head>
<body>

<nav>
    <div class="logo" onclick="navigate('home')">DormLift Pro</div>
    <div class="nav-links" id="menu"></div>
</nav>

<div class="container">
    <div id="home" class="page active">
        <div class="card" style="text-align:center; padding: 80px 20px;">
            <h1 style="font-size: 3rem; margin: 0;">University of Auckland Logistics</h1>
            <p style="color:var(--gray); font-size: 1.2rem; margin: 20px 0 40px;">Professional peer-to-peer student moving network.</p>
            <div style="display:flex; justify-content:center; gap:20px;">
                <button class="btn" style="width:200px" onclick="navigate('post-task')">Post Task</button>
                <button class="btn" style="width:200px; background:var(--dark);" onclick="navigate('hall')">Find Task</button>
            </div>
        </div>
    </div>

    <div id="post-task" class="page">
        <div class="card">
            <h2>Post a Request</h2>
            <div id="map"></div>
            <form id="taskForm">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <input type="text" id="p_from" placeholder="Pickup (Click Map)" readonly required>
                    <input type="text" id="p_to" placeholder="Destination (Click Map)" readonly required>
                    <input type="date" id="p_date" required>
                    <input type="text" id="p_reward" placeholder="Reward (e.g. $50)" required>
                    <select id="p_people"><option value="1">1 Person Needed</option><option value="2">2 People Needed</option></select>
                    <select id="p_lift"><option value="Yes">Elevator</option><option value="No">Stairs</option></select>
                </div>
                <textarea id="p_desc" placeholder="Special Instructions/Explanation" rows="3"></textarea>
                <input type="file" id="p_file" multiple>
                <button type="submit" class="btn" style="width:100%;">Broadcast Request</button>
            </form>
        </div>
    </div>

    <div id="hall" class="page">
        <h2 style="margin-bottom:25px;">Task Marketplace</h2>
        <div id="hall_list" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap:20px;"></div>
    </div>

    <div id="profile" class="page">
        <div class="card">
            <div class="profile-header">
                <div id="prof_avatar" class="avatar">?</div>
                <div><h1 id="prof_nickname" style="margin:0;">-</h1><p style="margin:0; color:var(--primary); font-weight:bold;">Verified Member</p></div>
            </div>
            <div class="info-grid">
                <div class="info-item"><label>Full Name</label><div id="d-name">-</div></div>
                <div class="info-item"><label>Given Name</label><div id="d-given">-</div></div>
                <div class="info-item"><label>Anonymous Name</label><div id="d-anon">-</div></div>
                <div class="info-item"><label>School</label><div id="d-school">-</div></div>
                <div class="info-item"><label>Gender</label><div id="d-gender">-</div></div>
                <div class="info-item"><label>Phone</label><div id="d-phone">-</div></div>
                <div class="info-item"><label>Email</label><div id="d-email">-</div></div>
                <div class="info-item"><label>Rating Avg</label><div style="color:var(--success)">5.0 ★</div></div>
                <div class="info-item"><label>Task Count</label><div id="d-count">0</div></div>
            </div>
        </div>
        <h3>My Posted Requests</h3><div id="my_posts"></div>
        <h3 style="margin-top:30px;">My Accepted Shifts</h3><div id="my_shifts"></div>
    </div>

    <div id="register" class="page">
        <div class="card" style="max-width:600px; margin:auto;">
            <h2>Establishing Membership</h2>
            <form id="regForm">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <input type="text" id="r_full" placeholder="Full Name" required>
                    <input type="text" id="r_anon" placeholder="Anonymous Nickname" required>
                    <input type="text" id="r_school" placeholder="University" required>
                    <select id="r_gender"><option>Male</option><option>Female</option></select>
                </div>
                <div style="display:flex; gap:10px;">
                    <input type="email" id="r_email" placeholder="Email Address" required style="margin:0;">
                    <button type="button" class="btn" style="width:140px; font-size:11px;" onclick="alert('Verification Code: 8888')">Get Code</button>
                </div>
                <input type="text" id="r_code" placeholder="Verification Code" required style="margin-top:12px;">
                <input type="text" id="r_phone" placeholder="Phone Number" required>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <input type="password" id="r_pwd" placeholder="Password" required>
                    <input type="password" id="r_pwd2" placeholder="Confirm Password" required>
                </div>
                <button type="submit" class="btn">Register Account</button>
            </form>
        </div>
    </div>

    <div id="login" class="page">
        <div class="card" style="max-width:400px; margin:auto; text-align:center;">
            <h2>Login</h2>
            <form id="loginForm">
                <input type="email" id="l_email" placeholder="Email" required>
                <input type="password" id="l_pwd" placeholder="Password" required>
                <button type="submit" class="btn">Authenticate</button>
            </form>
        </div>
    </div>
</div>

<div id="taskModal" class="modal"><div class="modal-content"><h2 id="m_reward" style="color:var(--success)"></h2><div id="m_imgs" style="display:flex; gap:10px; overflow-x:auto; margin:15px 0;"></div><div id="m_meta" style="font-size:14px; background:#f9f9f9; padding:15px; border-radius:12px; line-height:1.7;"></div><div id="m_action" style="margin-top:20px;"></div><button class="btn" style="background:var(--gray); margin-top:10px;" onclick="document.getElementById('taskModal').style.display='none'">Close</button></div></div>

<script>
    let user = JSON.parse(localStorage.getItem('user'));
    let map, markers = [], taskCache = {};

    function navigate(p) {
        if(!user && ['post-task', 'profile'].includes(p)) p = 'login';
        document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
        document.getElementById(p).classList.add('active'); updateMenu();
        if(p==='post-task') initMap(); if(p==='hall') loadHall(); if(p==='profile') loadProfile();
    }

    function updateMenu() {
        const m = document.getElementById('menu');
        if(!user) m.innerHTML = `<a onclick="navigate('home')">Home</a><a onclick="navigate('login')">Login</a><a onclick="navigate('register')">Register</a>`;
        else m.innerHTML = `<a onclick="navigate('home')">Home</a><a onclick="navigate('post-task')">Post Task</a><a onclick="navigate('hall')">Market</a><a onclick="navigate('profile')">Profile</a><a onclick="logout()">Logout</a>`;
    }
    function logout() { localStorage.clear(); location.reload(); }

    function initMap() {
        if(map) return;
        setTimeout(() => {
            map = L.map('map').setView([-36.8509, 174.7645], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            map.on('click', e => {
                if(markers.length >= 2) { markers.forEach(m => map.removeLayer(m)); markers = []; }
                let m = L.marker(e.latlng).addTo(map); markers.push(m);
                const loc = `${e.latlng.lat.toFixed(4)}, ${e.latlng.lng.toFixed(4)}`;
                if(markers.length===1) document.getElementById('p_from').value = loc;
                else document.getElementById('p_to').value = loc;
            });
        }, 300);
    }

    async function loadHall() {
        const res = await fetch('/api/task/all'); const d = await res.json();
        document.getElementById('hall_list').innerHTML = d.list.map(t => {
            taskCache[t._id] = t; const imgs = JSON.parse(t.img_url || '[]');
            return `<div class="card" onclick="viewTask('${t._id}')"><img src="${imgs[0] || 'https://via.placeholder.com/300x150'}" style="width:100%; height:130px; object-fit:cover; border-radius:12px;"><h3 style="color:var(--success); margin:10px 0 5px 0;">${t.reward}</h3><p style="font-size:12px; color:var(--gray); margin:0;">${t.move_date}</p></div>`;
        }).join('') || '<p>Searching for active tasks...</p>';
    }

    function viewTask(id) {
        const t = taskCache[id]; const imgs = JSON.parse(t.img_url || '[]');
        document.getElementById('m_reward').innerText = t.reward;
        document.getElementById('m_imgs').innerHTML = imgs.map(u => `<img src="${u}" style="height:90px; border-radius:10px;">`).join('');
        document.getElementById('m_meta').innerHTML = `<b>Pickup:</b> ${t.from_addr}<br><b>Destination:</b> ${t.to_addr}<br><b>Date:</b> ${t.move_date}<br><b>People:</b> ${t.people_needed}<br><b>Elevator:</b> ${t.elevator}<br><hr><b>Explanation:</b> ${t.items_desc}`;
        let btn = ''; if(user && t.publisher_id !== user.email && t.status === 'pending') btn = `<button class="btn" style="width:100%" onclick="updateStatus('${t._id}', 'assigned', '${user.email}')">Accept Task</button>`;
        document.getElementById('m_action').innerHTML = btn; document.getElementById('taskModal').style.display = 'flex';
    }

    async function loadProfile() {
        const res = await fetch('/api/user/profile', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email:user.email})});
        const d = await res.json(); const u = d.user;
        document.getElementById('prof_nickname').innerText = u.anonymous_name;
        document.getElementById('prof_avatar').innerText = u.anonymous_name[0].toUpperCase();
        document.getElementById('d-name').innerText = u.full_name;
        document.getElementById('d-given').innerText = u.full_name.split(' ')[0];
        document.getElementById('d-anon').innerText = u.anonymous_name;
        document.getElementById('d-school').innerText = u.school_name;
        document.getElementById('d-gender').innerText = u.gender;
        document.getElementById('d-phone').innerText = u.phone;
        document.getElementById('d-email').innerText = u.email;
        document.getElementById('d-count').innerText = u.task_count || 0;

        const res2 = await fetch('/api/user/dashboard', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email:user.email})});
        const d2 = await res2.json();
        document.getElementById('my_posts').innerHTML = d2.list.filter(t => t.publisher_id === user.email).map(t => `<div class="task-list-item"><div><b>${t.reward}</b><br><small>${t.status.toUpperCase()}</small></div><button class="btn-cancel" onclick="cancelTask('${t._id}', 'delete')">Cancel</button></div>`).join('') || '<p>No posted requests.</p>';
        document.getElementById('my_shifts').innerHTML = d2.list.filter(t => t.helper_id === user.email).map(t => `<div class="task-list-item"><div><b>${t.reward}</b><br><small>Accepted</small></div><button class="btn-cancel" onclick="cancelTask('${t._id}', 'unassign')">Quit</button></div>`).join('') || '<p>No shifts accepted.</p>';
    }

    async function updateStatus(id, s, h) { await fetch('/api/task/workflow', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({task_id:id, status:s, helper_id:h})}); document.getElementById('taskModal').style.display='none'; navigate('profile'); }
    async function cancelTask(id, type) { if(!confirm("Are you sure?")) return; await fetch('/api/task/cancel', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({task_id:id, type:type})}); loadProfile(); }

    document.getElementById('regForm').onsubmit = async e => {
        e.preventDefault(); if(document.getElementById('r_pwd').value !== document.getElementById('r_pwd2').value) return alert("Mismatch");
        const b = { full_name:document.getElementById('r_full').value, anonymous_name:document.getElementById('r_anon').value, school_name:document.getElementById('r_school').value, gender:document.getElementById('r_gender').value, email:document.getElementById('r_email').value, phone:document.getElementById('r_phone').value, password:document.getElementById('r_pwd').value };
        await fetch('/api/auth/register', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(b)}); navigate('login');
    };

    document.getElementById('loginForm').onsubmit = async e => {
        e.preventDefault(); const res = await fetch('/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email:document.getElementById('l_email').value, password:document.getElementById('l_pwd').value})});
        const d = await res.json(); if(d.success) { user = d.user; localStorage.setItem('user', JSON.stringify(user)); navigate('home'); }
    };

    document.getElementById('taskForm').onsubmit = async e => {
        e.preventDefault(); const f = new FormData();
        f.append('publisher_id', user.email); f.append('from_addr', document.getElementById('p_from').value); f.append('to_addr', document.getElementById('p_to').value); f.append('move_date', document.getElementById('p_date').value); f.append('reward', document.getElementById('p_reward').value); f.append('items_desc', document.getElementById('p_desc').value); f.append('people_needed', document.getElementById('p_people').value); f.append('elevator', document.getElementById('p_lift').value);
        const files = document.getElementById('p_file').files; for(let i=0; i<files.length; i++) f.append('task_images', files[i]);
        await fetch('/api/task/create', { method:'POST', body:f }); navigate('hall');
    };

    updateMenu(); navigate('home');
</script>
</body>
</html>
